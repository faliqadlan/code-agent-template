# code-agent-template:managed
# This file is inactive here. Review it, then manually copy it to
# `.github/workflows/validate-agent-template.yml` to enable it.
name: Validate agent template

on:
  pull_request:
    paths:
      - "AGENTS.md"
      - ".agents/**"
      - ".codex/agents/**"
      - "tests/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python tests/validate_template.py
